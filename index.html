<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina English - Aprenda Inglês com IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            color: #1A1A1A;
        }
        .selection-orange::selection {
            background-color: #ffedd5;
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .loader-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body class="selection-orange">
    <div id="app" class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar / Bottom Tab Bar (Injected by JS) -->
        <nav id="sidebar" class="hidden fixed bottom-0 left-0 right-0 z-[60] bg-white border-t border-gray-100 md:relative md:bottom-auto md:left-auto md:right-auto md:w-64 md:min-h-screen md:border-t-0 md:border-r md:flex md:flex-col">
            <div class="hidden md:flex items-center gap-2 px-6 py-8">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-200">
                    <i data-lucide="book-open" size="24"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Lumina</h1>
            </div>

            <div id="nav-items" class="flex md:flex-col justify-around md:justify-start px-2 py-2 md:px-4 md:gap-1 overflow-x-auto md:overflow-x-visible">
                <!-- Nav items injected here -->
            </div>
        </nav>

        <div id="main-wrapper" class="flex-1 flex flex-col min-h-0">
            <!-- Header -->
            <header id="main-header" class="hidden sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="back-button" class="hidden p-2 hover:bg-gray-100 rounded-full transition-colors">
                        <i data-lucide="arrow-left" size="20"></i>
                    </button>
                    <div class="flex items-center gap-2 md:hidden">
                        <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center text-white">
                            <i data-lucide="book-open" size="18"></i>
                        </div>
                        <h1 class="text-lg font-bold tracking-tight">Lumina</h1>
                    </div>
                    <h2 id="header-title" class="hidden md:block text-lg font-bold text-gray-800">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-4">
                    <div id="streak-counter" class="flex items-center gap-2 px-4 py-2 bg-orange-50 rounded-2xl border border-orange-100">
                        <i data-lucide="flame" class="text-orange-500 fill-orange-500" size="20"></i>
                        <span id="streak-value" class="font-black text-orange-600">0</span>
                    </div>
                    <button id="settings-button" class="p-2 rounded-full transition-colors hover:bg-gray-100 text-gray-400">
                        <i data-lucide="settings" size="20"></i>
                    </button>
                </div>
            </header>

            <main id="main-content" class="flex-1 overflow-y-auto pb-24 md:pb-12 relative">
                <!-- Global Loader -->
                <div id="global-loader" class="hidden absolute inset-0 z-50 bg-white/50 backdrop-blur-sm flex items-center justify-center">
                    <div class="bg-white p-8 rounded-3xl shadow-xl flex flex-col items-center gap-4">
                        <i data-lucide="loader-2" class="loader-spin text-orange-500" size="48"></i>
                        <p class="font-bold text-gray-600">Carregando...</p>
                    </div>
                </div>

                <div id="content-container" class="max-w-4xl mx-auto p-5 md:p-10">
                    <!-- Screens will be injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="hidden fixed bottom-24 md:bottom-8 right-8 bg-red-500 text-white px-8 py-5 rounded-[32px] shadow-2xl flex items-center gap-4 animate-bounce z-[100]">
        <i data-lucide="alert-circle" size="28"></i>
        <p id="error-message" class="font-black text-lg"></p>
        <button id="close-error" class="ml-4 hover:opacity-70 text-2xl">✕</button>
    </div>

    <!-- Scripts -->
    <script type="module">
        // --- State Management ---
        let state = {
            screen: 'LOGIN',
            activeTab: 'DASHBOARD',
            isLoggedIn: false,
            history: [],
            userData: {
                sessionsCompleted: 0,
                wordsLearned: 0,
                diagnosticCompleted: false,
                name: '',
                apiKey: '',
                stats: null,
                plan: null,
                streak: 0,
                streakLastDate: null,
                dailyHistory: {} // date string -> boolean
            },
            loading: false,
            diagnosticQuestions: [],
            currentQuestionIndex: 0,
            isDiagnosticSectionHeader: true,
            currentSection: 'reading',
            answers: [],
            currentModule: null,
            moduleContent: null,
            feedback: null,
            lastError: null
        };

        const LEVEL_LABELS = {
            0: "Nunca estudei",
            1: "Iniciante",
            2: "Básico",
            3: "Intermediário",
            4: "Avançado",
            5: "Fluente"
        };

        const getLevelLabel = (level = 0) => LEVEL_LABELS[Math.round(level)] || LEVEL_LABELS[0];

        // --- AI Helpers ---
        async function callGemini(prompt, responseMimeType = "application/json", schema = null) {
            const apiKey = state.userData.apiKey?.trim();
            if (!apiKey) throw new Error("API Key not found or invalid");

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent`;

            try {
                const generationConfig = {
                    temperature: 1,
                    topP: 0.95,
                    topK: 40,
                    maxOutputTokens: 8192,
                };

                if (responseMimeType) {
                    generationConfig.responseMimeType = responseMimeType;
                }
                if (schema) {
                    generationConfig.responseSchema = schema;
                }

                // Ensure prompt asks for JSON if mime type is set
                const finalPrompt = responseMimeType === "application/json" 
                    ? `${prompt}\n\nIMPORTANT: Return ONLY a valid JSON object. Do not include markdown code blocks or any other text.`
                    : prompt;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': apiKey
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: finalPrompt
                            }]
                        }],
                        generationConfig: generationConfig
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                let text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!text) throw new Error("Empty response from Gemini API");

                console.log(`Gemini REST Raw Response:`, text);

                // Clean JSON if needed (sometimes Gemini still adds markdown blocks)
                if (responseMimeType === "application/json") {
                    text = text.replace(/```json\n?/, '').replace(/```\n?$/, '').trim();
                }
                
                return text;
            } catch (err) {
                console.error(`Gemini API Fetch Error:`, err);
                throw err;
            }
        }

        // --- Navigation ---
        function showScreen(newScreen) {
            // Diagnostic Gating
            const restrictedScreens = ['STUDY', 'PLAN', 'DAILY_TASKS', 'TRAINING'];
            if (restrictedScreens.includes(newScreen) && !state.userData.diagnosticCompleted) {
                state.screen = 'BLOCKED';
                render();
                return;
            }

            state.history.push(state.screen);
            state.screen = newScreen;
            
            // Sync active tab
            if (['DASHBOARD', 'DAILY_TASKS', 'PLAN', 'TRAINING', 'SETTINGS'].includes(newScreen)) {
                state.activeTab = newScreen;
            } else if (newScreen === 'STUDY') {
                state.activeTab = 'TRAINING'; // Keep training active when inside a module
            }
            
            render();
        }

        function setActiveTab(tab) {
            state.activeTab = tab;
            render();
        }

        function goBack() {
            if (state.history.length > 0) {
                state.screen = state.history.pop();
                render();
            }
        }

        // --- Actions ---
        async function handleLogin(email, password) {
            // MVP: Accept any input
            state.isLoggedIn = true;
            saveData();
            
            if (!state.userData.apiKey) {
                showScreen('API_KEY');
            } else if (!state.userData.name) {
                showScreen('ONBOARDING');
            } else {
                showScreen('DASHBOARD');
            }
        }

        async function handleLogout() {
            state.isLoggedIn = false;
            // We don't necessarily clear apiKey/name unless user wants a full reset, 
            // but the prompt says returning to login is key.
            state.screen = 'LOGIN';
            state.activeTab = 'DASHBOARD';
            saveData();
            render();
        }

        async function handleApiKeySubmit(key) {
            if (!key) {
                showError("Por favor, insira sua chave API do Gemini para continuar.");
                return;
            }
            state.userData.apiKey = key.trim();
            saveData();
            
            if (!state.userData.name) {
                showScreen('ONBOARDING');
            } else {
                showScreen('DASHBOARD');
            }
        }

        async function handleOnboardingSubmit(data) {
            setLoading(true);
            try {
                const prompt = `Gere um plano de estudos semanal de inglês para um brasileiro com objetivo "${data.goal}", estudando ${data.days} dias por semana, ${data.minutes} minutos por dia. 
                Níveis atuais: {"overall": 1}. Priorize as fraquezas.
                Retorne um JSON onde as chaves são os dias (ex: "Segunda-feira") e os valores são a atividade recomendada (ex: "Leitura", "Escrita", "Audição", "Fala").`;
                
                const responseText = await callGemini(prompt);
                const schedule = JSON.parse(responseText);

                state.userData.name = data.name;
                state.userData.plan = {
                    goal: data.goal,
                    daysPerWeek: data.days,
                    minutesPerDay: data.minutes,
                    schedule: schedule
                };
                saveData();
                showScreen('DASHBOARD');
            } catch (err) {
                console.error("Onboarding Error:", err);
                showError(`Erro ao gerar plano de estudos: ${err.message}`, () => handleOnboardingSubmit(data));
            } finally {
                setLoading(false);
            }
        }

        async function startDiagnostic() {
            setLoading(true);
            try {
                const url = 'https://raw.githubusercontent.com/lbuzinhanic/lumina-english/main/questions.json';
                const response = await fetch(url);
                if (!response.ok) throw new Error("Falha ao carregar banco de questões");
                const allQuestions = await response.json();

                const select = (arr, n) => arr.sort(() => 0.5 - Math.random()).slice(0, n);

                const reading = select(allQuestions.filter(q => q.section === 'reading'), 4);
                const listening = select(allQuestions.filter(q => q.section === 'listening'), 3);
                
                const writingMC = select(allQuestions.filter(q => q.section === 'writing' && q.type === 'multiple_choice'), 2);
                const writingOpen = select(allQuestions.filter(q => q.section === 'writing' && q.type === 'open_writing'), 1);
                const writing = [...writingMC, ...writingOpen];

                const speaking = select(allQuestions.filter(q => q.section === 'speaking' && q.type === 'open_speaking'), 3);

                state.diagnosticQuestions = [...reading, ...listening, ...writing, ...speaking];
                state.currentQuestionIndex = 0;
                state.answers = [];
                state.isDiagnosticSectionHeader = true;
                state.currentSection = 'reading';
                
                showScreen('DIAGNOSTIC');
            } catch (err) {
                console.error("Diagnostic Error:", err);
                showError(`Erro ao carregar diagnóstico: ${err.message}`, () => startDiagnostic());
            } finally {
                setLoading(false);
            }
        }

        async function submitDiagnosticAnswer(answer) {
            const question = state.diagnosticQuestions[state.currentQuestionIndex];
            
            state.answers.push({
                questionId: question.id,
                skill: question.skill,
                type: question.type,
                taskType: question.taskType,
                questionText: question.question,
                userAnswer: answer,
                correctAnswer: question.correctAnswer
            });

            if (state.currentQuestionIndex < state.diagnosticQuestions.length - 1) {
                const nextQ = state.diagnosticQuestions[state.currentQuestionIndex + 1];
                if (nextQ.section !== question.section) {
                    state.isDiagnosticSectionHeader = true;
                    state.currentSection = nextQ.section;
                }
                state.currentQuestionIndex++;
                render();
            } else {
                evaluateDiagnostic();
            }
        }

        async function evaluateDiagnostic() {
            setLoading(true);
            try {
                const prompt = `Você é um especialista em SLA (Second Language Acquisition). Avalie este diagnóstico de inglês para um brasileiro:
                
                RESPOSTAS: ${JSON.stringify(state.answers)}
                
                RUBRICA DE AVALIAÇÃO:
                1. Múltipla Escolha: Verifique contra correctAnswer.
                2. Open Writing: Avalie em 3 dimensões (0-5 cada): Precisão gramatical (erros sistemáticos), Riqueza de vocabulário (variedade), Coerência.
                3. Open Speaking (Simulado): Avalie em 4 dimensões (0-5 cada): Fluência simulada (continuidade), Precisão gramatical, Complexidade (estruturas simples vs variadas), Adequação comunicativa.
                
                RETORNO (JSON):
                {
                  "reading": 0-5,
                  "writing": 0-5,
                  "listening": 0-5,
                  "speaking": 0-5,
                  "overall": 0-5,
                  "strengths": ["array de forças em Português"],
                  "weaknesses": ["array de fraquezas em Português"],
                  "qualitativeFeedback": "Um parágrafo em Português resumindo o perfil do usuário e como ele pode evoluir."
                }`;
                
                const responseText = await callGemini(prompt);
                state.userData.stats = JSON.parse(responseText);
                state.userData.diagnosticCompleted = true;
                saveData();
                showScreen('DIAGNOSTIC_RESULTS');
            } catch (err) {
                console.error("Evaluation Error:", err);
                showError(`Erro ao avaliar diagnóstico: ${err.message}`, () => evaluateDiagnostic());
            } finally {
                setLoading(false);
            }
        }

        async function startModule(type) {
            setLoading(true);
            state.currentModule = type;
            state.activeTab = type; // Ensure sidebar highlight updates
            state.feedback = null;
            state.moduleContent = null;
            
            if (!state.userData.diagnosticCompleted) {
                state.screen = 'BLOCKED';
                setLoading(false);
                render();
                return;
            }

            showScreen('STUDY');
            
            try {
                const level = state.userData.stats?.overall || 1;
                const levelLabel = level <= 1 ? "Iniciante" : level <= 2 ? "Básico" : level <= 3 ? "Intermediário" : "Avançado/Fluente";
                const goal = state.userData.plan?.goal || 'fluency';

                let prompt = "";
                if (type === 'reading') {
                    prompt = `Gere 3 opções de textos diferentes em inglês para o nível ${levelLabel} (${level}/5) sobre tópicos variados (cotidiano, tecnologia, viagens, saúde, negócios ou cultura). 
                    Cada opção deve ter: um título curto, o texto (80-200 palavras), 3 perguntas de compreensão e 3 termos de vocabulário com tradução.
                    Retorne um JSON com uma chave "options" que é um array de 3 objetos.`;
                } else if (type === 'writing') {
                    prompt = `Gere um desafio de escrita em inglês para o nível ${levelLabel} (${level}/5). 
                    - Se Iniciante: peça 1-2 frases sobre um tópico simples.
                    - Se Básico: peça um parágrafo curto (3-5 frases).
                    - Se Intermediário: peça sobre uma experiência real ou opinião.
                    - Se Avançado: peça um argumento estruturado ou texto profissional (150+ palavras).
                    Retorne um JSON com a chave "prompt".`;
                } else if (type === 'listening') {
                    prompt = `Gere um script de áudio simulado em inglês nível ${level} sobre ${goal}. 
                    Retorne um JSON com: "script" (o texto do áudio), "dictationExercise" (uma frase com lacuna para completar), e "questions" (array de 2 perguntas). 
                    NÃO deixe campos vazios.`;
                } else if (type === 'speaking') {
                    prompt = `Gere uma simulação de diálogo em inglês nível ${level} sobre ${goal}. 
                    Retorne um JSON com: "dialogueContext" (descrição da situação) e "interlocutorLine" (a fala que o usuário deve responder). 
                    NÃO deixe campos vazios.`;
                }

                const responseText = await callGemini(prompt);
                state.moduleContent = JSON.parse(responseText);
                render();
            } catch (err) {
                console.error("Module Loading Error:", err);
                showError(`Erro ao carregar módulo: ${err.message}`, () => startModule(type));
            } finally {
                setLoading(false);
            }
        }

        async function submitModuleResponse(response) {
            setLoading(true);
            try {
                const prompt = `Avalie a resposta do usuário no módulo ${state.currentModule}. 
                Contexto: ${JSON.stringify(state.moduleContent)}. 
                Resposta do usuário: "${response}".
                Forneça feedback em Português do Brasil: 
                1. Explique erros (chave "explanation").
                2. Mostre a forma correta (chave "correctForm").
                3. Sugira como um nativo diria (chave "nativeSuggestion").
                4. Dê uma nota de 0 a 10 (chave "score").
                Retorne em JSON.`;
                
                const responseText = await callGemini(prompt);
                state.feedback = JSON.parse(responseText);
                
                if (state.feedback.score >= 7) {
                    state.userData.sessionsCompleted++;
                    state.userData.wordsLearned += (state.moduleContent.vocabulary?.length || 5);
                    saveData();
                }
                render();
            } catch (err) {
                console.error("Feedback Error:", err);
                showError(`Erro ao obter feedback: ${err.message}`, () => submitModuleResponse(response));
            } finally {
                setLoading(false);
            }
        }

        function toggleDailyTask() {
            const dateKey = new Date().toISOString().split('T')[0];
            const isCurrentlyDone = !!state.userData.dailyHistory[dateKey];

            if (!isCurrentlyDone) {
                state.userData.dailyHistory[dateKey] = true;
                
                // Streak Logic
                const lastDate = state.userData.streakLastDate;
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];

                if (lastDate === yesterdayStr) {
                    state.userData.streak++;
                } else if (!lastDate || lastDate !== dateKey) {
                    state.userData.streak = 1;
                }
                
                state.userData.streakLastDate = dateKey;
            } else {
                // If user unchecks (if we allow it, though the UI hides the checkbox once done)
                delete state.userData.dailyHistory[dateKey];
                // Note: Not resetting streak on uncheck for MVP sanity
            }
            
            saveData();
            render();
        }

        // --- Persistence ---
        function saveData() {
            localStorage.setItem('lumina_vanilla_data', JSON.stringify(state.userData));
            localStorage.setItem('lumina_is_logged_in', state.isLoggedIn);
        }

        function loadData() {
            const saved = localStorage.getItem('lumina_vanilla_data');
            const loggedIn = localStorage.getItem('lumina_is_logged_in') === 'true';
            
            if (saved) {
                state.userData = JSON.parse(saved);
                
                // Initialize new fields
                if (state.userData.streak === undefined) state.userData.streak = 0;
                if (!state.userData.dailyHistory) state.userData.dailyHistory = {};

                // Check Streak logic
                const today = new Date().toISOString().split('T')[0];
                const lastDate = state.userData.streakLastDate;

                if (lastDate && lastDate !== today) {
                    const lastDateObj = new Date(lastDate);
                    const diff = Math.floor((new Date() - lastDateObj) / (1000 * 60 * 60 * 24));
                    if (diff > 1) {
                        state.userData.streak = 0; // Reset streak if missed more than 1 day
                        saveData();
                    }
                }
            }
            
            state.isLoggedIn = loggedIn;

            if (!state.isLoggedIn) {
                state.screen = 'LOGIN';
            } else if (!state.userData.apiKey) {
                state.screen = 'API_KEY';
            } else if (!state.userData.name) {
                state.screen = 'ONBOARDING';
            } else {
                state.screen = 'DASHBOARD';
                state.activeTab = 'DASHBOARD';
            }
        }

        // --- UI Rendering ---
        function setLoading(val) {
            state.loading = val;
            const loader = document.getElementById('global-loader');
            if (val) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        function showError(msg, retryFn = null) {
            console.error("App Error:", msg);
            state.lastError = { msg, retryFn };
            const toast = document.getElementById('error-toast');
            const message = document.getElementById('error-message');
            message.innerHTML = `
                <div class="flex flex-col gap-2">
                    <span>${msg}</span>
                    ${retryFn ? `<button onclick="state.lastError.retryFn(); document.getElementById('error-toast').classList.add('hidden')" class="bg-white text-red-500 px-4 py-1 rounded-full text-sm font-bold self-start hover:bg-red-50 transition-colors">Tentar novamente</button>` : ''}
                </div>
            `;
            toast.classList.remove('hidden');
            if (!retryFn) {
                setTimeout(() => toast.classList.add('hidden'), 5000);
            }
        }

        function render() {
            const app = document.getElementById('app');
            const container = document.getElementById('content-container');
            const sidebar = document.getElementById('sidebar');
            const header = document.getElementById('main-header');
            const backBtn = document.getElementById('back-button');
            const headerTitle = document.getElementById('header-title');
            const mainContent = document.getElementById('main-content');

            // Force Login screen if not authenticated
            if (!state.isLoggedIn && state.screen !== 'LOGIN') {
                state.screen = 'LOGIN';
            }

            // Visibility: Hide everything except core content for Auth screens
            const isAuthScreen = ['LOGIN', 'API_KEY', 'ONBOARDING'].includes(state.screen);
            const isFullApp = state.isLoggedIn && state.userData.apiKey && state.userData.name && !isAuthScreen;
            
            if (isFullApp) {
                sidebar.classList.remove('hidden', 'md:hidden');
                sidebar.classList.add('md:flex');
                header.classList.remove('hidden');
                app.className = "min-h-screen flex flex-col md:flex-row bg-[#F8F9FA]";
                mainContent.className = "flex-1 overflow-y-auto pb-24 md:pb-12 relative";
                container.className = "max-w-7xl mx-auto p-4 md:p-8 w-full"; 
            } else {
                sidebar.classList.add('hidden', 'md:hidden');
                sidebar.classList.remove('md:flex');
                header.classList.add('hidden');
                // Use flexbox on app and mainContent to perfectly center horizontally AND vertically
                app.className = "min-h-screen flex flex-col bg-gray-50"; 
                mainContent.className = "flex-1 flex items-center justify-center p-4 min-h-screen relative";
                container.className = state.screen === 'ONBOARDING' ? "w-full max-w-2xl" : "w-full max-w-md"; 
            }

            if (state.screen !== 'DASHBOARD') backBtn.classList.remove('hidden');
            else backBtn.classList.add('hidden');

            headerTitle.innerText = {
                'DASHBOARD': 'Dashboard',
                'SETTINGS': 'Configurações',
                'STUDY': 'Estudo',
                'DIAGNOSTIC': 'Diagnóstico',
                'PLAN': 'Plano de Estudos',
                'DAILY_TASKS': 'Estudos do Dia',
                'TRAINING': 'Treinamento'
            }[state.screen] || '';

            // Update Streak in Header
            const streakVal = document.getElementById('streak-value');

        window.goBack = goBack;
        window.startDiagnostic = startDiagnostic;
        window.submitDiagnosticAnswer = submitDiagnosticAnswer;
        window.startModule = startModule;
        window.submitModuleResponse = submitModuleResponse;
        window.handleLogout = handleLogout;
        window.toggleDailyTask = toggleDailyTask;
        window.setActiveTab = (tab) => { state.activeTab = tab; render(); };

        document.getElementById('back-button').addEventListener('click', goBack);
        document.getElementById('settings-button').addEventListener('click', () => showScreen('SETTINGS'));
        document.getElementById('close-error').addEventListener('click', () => document.getElementById('error-toast').classList.add('hidden'));

        // --- Init ---
        loadData();
        render();
    </script>
</body>
</html>
