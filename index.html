<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina English - Aprenda Inglês com IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            color: #1A1A1A;
        }
        .selection-orange::selection {
            background-color: #ffedd5;
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .loader-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body class="selection-orange">
    <div id="app" class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar / Bottom Tab Bar (Injected by JS) -->
        <nav id="sidebar" class="hidden fixed bottom-0 left-0 right-0 z-[60] bg-white border-t border-gray-100 md:relative md:bottom-auto md:left-auto md:right-auto md:w-64 md:min-h-screen md:border-t-0 md:border-r md:flex md:flex-col">
            <div class="hidden md:flex items-center gap-2 px-6 py-8">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-200">
                    <i data-lucide="book-open" size="24"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Lumina</h1>
            </div>

            <div id="nav-items" class="flex md:flex-col justify-around md:justify-start px-2 py-2 md:px-4 md:gap-1 overflow-x-auto md:overflow-x-visible">
                <!-- Nav items injected here -->
            </div>
        </nav>

        <div class="flex-1 flex flex-col min-h-0">
            <!-- Header -->
            <header id="main-header" class="hidden sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="back-button" class="hidden p-2 hover:bg-gray-100 rounded-full transition-colors">
                        <i data-lucide="arrow-left" size="20"></i>
                    </button>
                    <div class="flex items-center gap-2 md:hidden">
                        <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center text-white">
                            <i data-lucide="book-open" size="18"></i>
                        </div>
                        <h1 class="text-lg font-bold tracking-tight">Lumina</h1>
                    </div>
                    <h2 id="header-title" class="hidden md:block text-lg font-bold text-gray-800">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-2">
                    <button id="settings-button" class="p-2 rounded-full transition-colors hover:bg-gray-100 text-gray-400">
                        <i data-lucide="settings" size="20"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-24 md:pb-12 relative">
                <!-- Global Loader -->
                <div id="global-loader" class="hidden absolute inset-0 z-50 bg-white/50 backdrop-blur-sm flex items-center justify-center">
                    <div class="bg-white p-8 rounded-3xl shadow-xl flex flex-col items-center gap-4">
                        <i data-lucide="loader-2" class="loader-spin text-orange-500" size="48"></i>
                        <p class="font-bold text-gray-600">Carregando...</p>
                    </div>
                </div>

                <div id="content-container" class="max-w-4xl mx-auto p-5 md:p-10">
                    <!-- Screens will be injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="hidden fixed bottom-24 md:bottom-8 right-8 bg-red-500 text-white px-8 py-5 rounded-[32px] shadow-2xl flex items-center gap-4 animate-bounce z-[100]">
        <i data-lucide="alert-circle" size="28"></i>
        <p id="error-message" class="font-black text-lg"></p>
        <button id="close-error" class="ml-4 hover:opacity-70 text-2xl">✕</button>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { GoogleGenerativeAI } from 'https://cdn.jsdelivr.net/npm/@google/generative-ai/+esm';

        // --- State Management ---
        let state = {
            screen: 'API_KEY',
            activeTab: 'DASHBOARD',
            history: [],
            userData: {
                sessionsCompleted: 0,
                wordsLearned: 0,
                diagnosticCompleted: false,
                name: '',
                apiKey: '',
                stats: null,
                plan: null
            },
            loading: false,
            diagnosticQuestions: [],
            currentQuestionIndex: 0,
            answers: [],
            currentModule: null,
            moduleContent: null,
            feedback: null
        };

        const LEVEL_LABELS = {
            0: "Nunca estudei",
            1: "Iniciante",
            2: "Básico",
            3: "Intermediário",
            4: "Avançado",
            5: "Fluente"
        };

        const getLevelLabel = (level = 0) => LEVEL_LABELS[Math.round(level)] || LEVEL_LABELS[0];

        // --- AI Helpers ---
        const getAI = () => {
            const key = state.userData.apiKey?.trim();
            if (!key) return null;
            try {
                return new GoogleGenerativeAI(key);
            } catch (err) {
                console.error("Error initializing Gemini SDK:", err);
                return null;
            }
        };

        async function callGemini(prompt, responseMimeType = "application/json", schema = null) {
            try {
                const genAI = getAI();
                if (!genAI) throw new Error("API Key not found or invalid");
                
                const generationConfig = {
                    temperature: 1,
                    topP: 0.95,
                    topK: 40,
                    maxOutputTokens: 8192,
                };

                if (responseMimeType) {
                    generationConfig.responseMimeType = responseMimeType;
                }
                if (schema) {
                    generationConfig.responseSchema = schema;
                }

                const model = genAI.getGenerativeModel({ 
                    model: "gemini-2.0-flash",
                    generationConfig
                });

                // Ensure prompt asks for JSON if mime type is set
                const finalPrompt = responseMimeType === "application/json" 
                    ? `${prompt}\n\nIMPORTANT: Return ONLY a valid JSON object. Do not include markdown code blocks or any other text.`
                    : prompt;

                const result = await model.generateContent(finalPrompt);
                const response = await result.response;
                let text = response.text();
                
                console.log("Gemini Raw Response:", text);

                // Clean JSON if needed (sometimes Gemini still adds markdown blocks)
                if (responseMimeType === "application/json") {
                    text = text.replace(/```json\n?/, '').replace(/```\n?$/, '').trim();
                }
                
                return text;
            } catch (err) {
                console.error("Detailed Gemini API Error:", err);
                // Extract more info if available
                const errorMsg = err.message || "Erro desconhecido na API";
                throw new Error(errorMsg);
            }
        }

        // --- Navigation ---
        function showScreen(newScreen) {
            state.history.push(state.screen);
            state.screen = newScreen;
            if (['DASHBOARD', 'DIAGNOSTIC', 'SETTINGS'].includes(newScreen)) {
                state.activeTab = newScreen;
            }
            render();
        }

        function goBack() {
            if (state.history.length > 0) {
                state.screen = state.history.pop();
                render();
            }
        }

        // --- Actions ---
        async function handleApiKeySubmit(key) {
            state.userData.apiKey = key;
            saveData();
            showScreen('ONBOARDING');
        }

        async function handleOnboardingSubmit(data) {
            setLoading(true);
            try {
                const prompt = `Gere um plano de estudos semanal de inglês para um brasileiro com objetivo "${data.goal}", estudando ${data.days} dias por semana, ${data.minutes} minutos por dia. 
                Níveis atuais: {"overall": 1}. Priorize as fraquezas.
                Retorne um JSON onde as chaves são os dias (ex: "Segunda-feira") e os valores são a atividade recomendada (ex: "Leitura", "Escrita", "Audição", "Fala").`;
                
                const responseText = await callGemini(prompt);
                const schedule = JSON.parse(responseText);

                state.userData.name = data.name;
                state.userData.plan = {
                    goal: data.goal,
                    daysPerWeek: data.days,
                    minutesPerDay: data.minutes,
                    schedule: schedule
                };
                saveData();
                showScreen('DASHBOARD');
            } catch (err) {
                console.error("Onboarding Error:", err);
                showError(`Erro ao gerar plano de estudos: ${err.message}`);
            } finally {
                setLoading(false);
            }
        }

        async function startDiagnostic() {
            setLoading(true);
            try {
                const prompt = `Gere exatamente 25 questões de múltipla escolha para diagnóstico de inglês para brasileiros. 
                Estrutura:
                - Questões 1–5: Iniciante (vocabulário básico, saudações, reconhecimento simples).
                - Questões 6–10: Básico-funcional (verbos comuns, frases do dia a dia, leitura simples).
                - Questões 11–15: Intermediário (compreensão de parágrafos, gramática, phrasal verbs).
                - Questões 16–20: Intermediário-superior (expressões idiomáticas, leitura complexa, inferência).
                - Questões 21–25: Avançado (compreensão de nuances, escrita formal, simulação de audição complexa).
                
                Distribua as habilidades igualmente: pelo menos 5 de leitura, 5 de vocabulário, 5 de simulação de audição, 5 de gramática e 5 de simulação de fala/escrita.
                Cada questão DEVE ter exatamente 4 opções (A, B, C, D) e apenas uma resposta correta.
                As perguntas devem ser em Português, as respostas podem ser em Inglês ou Português.
                Retorne em JSON estrito seguindo este formato:
                [{ "id": 1, "skill": "vocabulary", "question": "...", "options": ["A) ...", "B) ...", "C) ...", "D) ..."], "correctAnswer": "A) ...", "type": "multiple" }]`;
                
                const responseText = await callGemini(prompt);
                state.diagnosticQuestions = JSON.parse(responseText);
                state.currentQuestionIndex = 0;
                state.answers = [];
                showScreen('DIAGNOSTIC');
            } catch (err) {
                console.error("Diagnostic Error:", err);
                showError(`Erro ao carregar diagnóstico: ${err.message}`);
            } finally {
                setLoading(false);
            }
        }

        async function submitDiagnosticAnswer(answer) {
            const question = state.diagnosticQuestions[state.currentQuestionIndex];
            const isCorrect = answer === question.correctAnswer;
            state.answers.push({
                questionId: question.id,
                skill: question.skill,
                answer,
                isCorrect
            });

            if (state.currentQuestionIndex < state.diagnosticQuestions.length - 1) {
                state.currentQuestionIndex++;
                render();
            } else {
                setLoading(true);
                try {
                    const prompt = `Avalie estas 25 respostas de diagnóstico de inglês: ${JSON.stringify(state.answers)}. 
                    Retorne um objeto JSON com níveis de 0 a 5 para: vocabulary, reading, listening, speaking, writing (baseado na gramática/vocabulário demonstrado), e overall.
                    Inclua também strengths (array) e weaknesses (array) em Português do Brasil.`;
                    
                    const responseText = await callGemini(prompt);
                    state.userData.stats = JSON.parse(responseText);
                    saveData();
                    showScreen('DIAGNOSTIC_RESULTS');
                } catch (err) {
                    console.error("Diagnostic Evaluation Error:", err);
                    showError(`Erro ao avaliar diagnóstico: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            }
        }

        async function startModule(type) {
            setLoading(true);
            state.currentModule = type;
            state.activeTab = type;
            state.feedback = null;
            state.moduleContent = null;
            showScreen('STUDY');
            
            try {
                const level = state.userData.stats?.overall || 1;
                const levelLabel = level <= 1 ? "Iniciante" : level <= 2 ? "Básico" : level <= 3 ? "Intermediário" : "Avançado/Fluente";
                const goal = state.userData.plan?.goal || 'fluency';

                let prompt = "";
                if (type === 'reading') {
                    prompt = `Gere 3 opções de textos diferentes em inglês para o nível ${levelLabel} (${level}/5) sobre tópicos variados (cotidiano, tecnologia, viagens, saúde, negócios ou cultura). 
                    Cada opção deve ter: um título curto, o texto (80-200 palavras), 3 perguntas de compreensão e 3 termos de vocabulário com tradução.
                    Retorne um JSON com uma chave "options" que é um array de 3 objetos.`;
                } else if (type === 'writing') {
                    prompt = `Gere um desafio de escrita em inglês para o nível ${levelLabel} (${level}/5). 
                    - Se Iniciante: peça 1-2 frases sobre um tópico simples.
                    - Se Básico: peça um parágrafo curto (3-5 frases).
                    - Se Intermediário: peça sobre uma experiência real ou opinião.
                    - Se Avançado: peça um argumento estruturado ou texto profissional (150+ palavras).
                    Retorne um JSON com a chave "prompt".`;
                } else if (type === 'listening') {
                    prompt = `Gere um script de áudio simulado em inglês nível ${level} sobre ${goal}. 
                    Retorne um JSON com: "script" (o texto do áudio), "dictationExercise" (uma frase com lacuna para completar), e "questions" (array de 2 perguntas). 
                    NÃO deixe campos vazios.`;
                } else if (type === 'speaking') {
                    prompt = `Gere uma simulação de diálogo em inglês nível ${level} sobre ${goal}. 
                    Retorne um JSON com: "dialogueContext" (descrição da situação) e "interlocutorLine" (a fala que o usuário deve responder). 
                    NÃO deixe campos vazios.`;
                }

                const responseText = await callGemini(prompt);
                state.moduleContent = JSON.parse(responseText);
                render();
            } catch (err) {
                console.error("Module Loading Error:", err);
                showError(`Erro ao carregar módulo: ${err.message}`);
            } finally {
                setLoading(false);
            }
        }

        async function submitModuleResponse(response) {
            setLoading(true);
            try {
                const prompt = `Avalie a resposta do usuário no módulo ${state.currentModule}. 
                Contexto: ${JSON.stringify(state.moduleContent)}. 
                Resposta do usuário: "${response}".
                Forneça feedback em Português do Brasil: 
                1. Explique erros (chave "explanation").
                2. Mostre a forma correta (chave "correctForm").
                3. Sugira como um nativo diria (chave "nativeSuggestion").
                4. Dê uma nota de 0 a 10 (chave "score").
                Retorne em JSON.`;
                
                const responseText = await callGemini(prompt);
                state.feedback = JSON.parse(responseText);
                
                if (state.feedback.score >= 7) {
                    state.userData.sessionsCompleted++;
                    state.userData.wordsLearned += (state.moduleContent.vocabulary?.length || 5);
                    saveData();
                }
                render();
            } catch (err) {
                console.error("Feedback Error:", err);
                showError(`Erro ao obter feedback: ${err.message}`);
            } finally {
                setLoading(false);
            }
        }

        // --- Persistence ---
        function saveData() {
            localStorage.setItem('lumina_vanilla_data', JSON.stringify(state.userData));
        }

        function loadData() {
            const saved = localStorage.getItem('lumina_vanilla_data');
            if (saved) {
                state.userData = JSON.parse(saved);
                if (state.userData.name) {
                    state.screen = 'DASHBOARD';
                } else if (state.userData.apiKey) {
                    state.screen = 'ONBOARDING';
                }
            }
        }

        // --- UI Rendering ---
        function setLoading(val) {
            state.loading = val;
            const loader = document.getElementById('global-loader');
            if (val) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        function showError(msg) {
            console.error("App Error:", msg);
            const toast = document.getElementById('error-toast');
            const message = document.getElementById('error-message');
            message.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        function render() {
            const container = document.getElementById('content-container');
            const sidebar = document.getElementById('sidebar');
            const header = document.getElementById('main-header');
            const backBtn = document.getElementById('back-button');
            const headerTitle = document.getElementById('header-title');

            // Visibility
            if (state.userData.name && state.screen !== 'API_KEY' && state.screen !== 'ONBOARDING') {
                sidebar.classList.remove('hidden');
                header.classList.remove('hidden');
            } else {
                sidebar.classList.add('hidden');
                header.classList.add('hidden');
            }

            if (state.screen !== 'DASHBOARD') backBtn.classList.remove('hidden');
            else backBtn.classList.add('hidden');

            headerTitle.innerText = {
                'DASHBOARD': 'Dashboard',
                'SETTINGS': 'Configurações',
                'STUDY': 'Estudo',
                'DIAGNOSTIC': 'Diagnóstico'
            }[state.screen] || '';

            // Render Sidebar Items
            const navItems = document.getElementById('nav-items');
            const items = [
                { id: 'DASHBOARD', label: 'Dashboard', icon: 'home' },
                { id: 'DIAGNOSTIC', label: 'Diagnóstico', icon: 'clipboard-list', action: 'startDiagnostic()' },
                { id: 'PLAN', label: 'Plano', icon: 'calendar', action: "setActiveTab('PLAN'); showScreen('DASHBOARD')" },
                { id: 'reading', label: 'Leitura', icon: 'book-open', action: "startModule('reading')" },
                { id: 'writing', label: 'Escrita', icon: 'pen-tool', action: "startModule('writing')" },
                { id: 'listening', label: 'Audição', icon: 'headphones', action: "startModule('listening')" },
                { id: 'speaking', label: 'Fala', icon: 'mic-2', action: "startModule('speaking')" },
            ];

            navItems.innerHTML = items.map(item => {
                const isActive = state.activeTab === item.id;
                return `
                    <button onclick="${item.action || `showScreen('${item.id}')`}" class="flex flex-col md:flex-row items-center gap-1 md:gap-3 px-3 py-2 md:px-4 md:py-3 rounded-xl transition-all ${isActive ? 'text-orange-500 bg-orange-50 md:bg-orange-500 md:text-white shadow-sm md:shadow-orange-200' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-50'}">
                        <i data-lucide="${item.icon}" size="20"></i>
                        <span class="text-[10px] md:text-sm font-bold whitespace-nowrap">${item.label}</span>
                    </button>
                `;
            }).join('');

            // Render Screens
            let html = '';
            switch (state.screen) {
                case 'API_KEY':
                    html = `
                        <div class="max-w-md mx-auto bg-white p-8 rounded-[40px] shadow-2xl shadow-gray-100 border border-gray-50">
                            <h2 class="text-3xl font-black mb-2">Bem-vindo ao Lumina</h2>
                            <p class="text-gray-500 mb-8">Para começar, insira sua chave da API do Gemini. Seus dados são salvos localmente.</p>
                            <form id="api-key-form" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold mb-2 uppercase tracking-widest text-gray-400">Chave API Gemini</label>
                                    <input id="api-key-input" type="password" placeholder="Insira sua chave aqui..." class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-gray-50">
                                </div>
                                <button type="submit" class="w-full bg-orange-500 text-white font-bold py-5 rounded-2xl hover:bg-orange-600 transition-all shadow-xl shadow-orange-200 active:scale-95">Começar Jornada</button>
                            </form>
                            <p class="mt-8 text-xs text-center text-gray-400">Não tem uma chave? <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-orange-500 underline font-bold">Obtenha aqui gratuitamente</a></p>
                        </div>
                    `;
                    break;
                case 'ONBOARDING':
                    html = `
                        <div class="max-w-2xl mx-auto space-y-8">
                            <div class="bg-white p-5 rounded-[40px] shadow-2xl shadow-gray-100 border border-gray-50">
                                <h2 class="text-3xl font-black mb-8">Configure seu Perfil</h2>
                                <form id="onboarding-form" class="space-y-8">
                                    <div>
                                        <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Seu Nome</label>
                                        <input name="name" required placeholder="Como podemos te chamar?" class="w-full p-5 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-orange-500 text-lg">
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div>
                                            <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Dias por semana</label>
                                            <select name="days" class="w-full p-5 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-orange-500">
                                                <option value="3">3 dias</option>
                                                <option value="5">5 dias</option>
                                                <option value="7">Todos os dias</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Minutos por dia</label>
                                            <select name="minutes" class="w-full p-5 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-orange-500">
                                                <option value="15">15 minutos</option>
                                                <option value="30">30 minutos</option>
                                                <option value="60">1 hora</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Objetivo Principal</label>
                                        <div class="grid grid-cols-2 gap-4">
                                            <label class="relative cursor-pointer group">
                                                <input type="radio" name="goal" value="travel" class="peer sr-only">
                                                <div class="p-5 rounded-3xl border border-gray-100 bg-gray-50 peer-checked:border-orange-500 peer-checked:bg-orange-50 transition-all text-center group-hover:bg-white shadow-sm">
                                                    <span class="text-3xl mb-2 block">✈️</span>
                                                    <span class="text-sm font-bold">Viagem</span>
                                                </div>
                                            </label>
                                            <label class="relative cursor-pointer group">
                                                <input type="radio" name="goal" value="fluency" checked class="peer sr-only">
                                                <div class="p-5 rounded-3xl border border-gray-100 bg-gray-50 peer-checked:border-orange-500 peer-checked:bg-orange-50 transition-all text-center group-hover:bg-white shadow-sm">
                                                    <span class="text-3xl mb-2 block">🗣️</span>
                                                    <span class="text-sm font-bold">Fluência</span>
                                                </div>
                                            </label>
                                            <label class="relative cursor-pointer group">
                                                <input type="radio" name="goal" value="work" class="peer sr-only">
                                                <div class="p-5 rounded-3xl border border-gray-100 bg-gray-50 peer-checked:border-orange-500 peer-checked:bg-orange-50 transition-all text-center group-hover:bg-white shadow-sm">
                                                    <span class="text-3xl mb-2 block">💼</span>
                                                    <span class="text-sm font-bold">Trabalho</span>
                                                </div>
                                            </label>
                                            <label class="relative cursor-pointer group">
                                                <input type="radio" name="goal" value="content" class="peer sr-only">
                                                <div class="p-5 rounded-3xl border border-gray-100 bg-gray-50 peer-checked:border-orange-500 peer-checked:bg-orange-50 transition-all text-center group-hover:bg-white shadow-sm">
                                                    <span class="text-3xl mb-2 block">📺</span>
                                                    <span class="text-sm font-bold">Conteúdo</span>
                                                </div>

                        </div>
                        <div class="bg-green-50 p-5 rounded-[32px] border border-green-100 shadow-sm">
                            <h4 class="text-[10px] font-black uppercase text-green-600 mb-4 tracking-[0.2em]">Forma Correta</h4>
                            <p class="text-green-900 font-bold text-xl italic leading-tight">"${f.correctForm}"</p>
                        </div>
                    </div>
                    <div class="bg-blue-50 p-5 rounded-[40px] border border-blue-100 shadow-sm">
                        <h4 class="text-[10px] font-black uppercase text-blue-600 mb-4 tracking-[0.2em]">Como um Nativo Diria</h4>
                        <p class="text-blue-900 font-black text-2xl italic leading-tight">"${f.nativeSuggestion}"</p>
                    </div>
                    <button onclick="startModule(state.currentModule)" class="w-full border-4 border-orange-500 text-orange-500 font-black py-6 rounded-[32px] hover:bg-orange-50 transition-all text-xl">Tentar Outro Exercício</button>
                </div>
            `;
        }

        // --- Global Listeners ---
        window.showScreen = showScreen;
        window.goBack = goBack;
        window.startDiagnostic = startDiagnostic;
        window.submitDiagnosticAnswer = submitDiagnosticAnswer;
        window.startModule = startModule;
        window.submitModuleResponse = submitModuleResponse;
        window.setActiveTab = (tab) => { state.activeTab = tab; render(); };

        document.getElementById('back-button').addEventListener('click', goBack);
        document.getElementById('settings-button').addEventListener('click', () => showScreen('SETTINGS'));
        document.getElementById('close-error').addEventListener('click', () => document.getElementById('error-toast').classList.add('hidden'));

        // --- Init ---
        loadData();
        render();
    </script>
</body>
</html>
